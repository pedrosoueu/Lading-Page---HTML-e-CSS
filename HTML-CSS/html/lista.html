<!DOCTYPE html> <!-- indica documento html-->
<html lang="pt-BR"> <!-- indica a língua utilizada-->
<head>
 <meta charset="UTF-8"> <!-- indica que pode ter caracteres especiais -->
 <title> exemplo de lista </title> <!-- titulo -->
</head>
<body> <!-- indica o inicio da pagina -->

<h1> Minhas lista</h1>

<h2> lista não numerada </h2> 
<ul> <!-- indica lista não numerada -->

 <li><b> Maçã</b></li> <!-- <li></li> indica itens da lista e <b></b> negrito -->
 <li>Banana</li>
 <li>Laranja</li>

</ul>

<h2>lista numerada</h2>

<ol> <!-- indica lista numerada -->

 <li>Maçã</li>
 <li>Banana</li>
 <li>Laranja</li>

</ol> 
</body>
